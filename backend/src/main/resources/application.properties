spring.application.name=backend
server.port=8080
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb

# CORS (si el frontend NO usa el proxy de Vite). Separar por comas.
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173

tasf.data.path=data

# WebSocket streaming
tasf.sim.stream.intervalMs=250
tasf.sim.stream.routeLimit=220

# Playback: objetivo de duracion total (minutos) para X dias
tasf.sim.playback.targetMinutes=2

# ── Planificación Programada (PLANIFICACION_PROGRAMADA.md) ─────────────────
# Sa = 30 min → CYCLES_PER_DAY = 1440/30 = 48 ciclos por día simulado.
# K implícito = (targetMinutes * 60_000) / (totalDays * CYCLES_PER_DAY * sleepMs)
# Para 5 días con targetMinutes=60: K ≈ 4 (Sc = K*Sa = 4*30 = 120 min simulados/ciclo real)

# ── Colapso informativo (PLAN_COLAPSO_INFORMATIVO.md) ─────────────────────
# Umbral de SLA (0-100) y días consecutivos bajo el umbral para terminar
# la simulación cuando endCondition=SLA_BELOW_THRESHOLD.
tasf.sim.collapse.slaThreshold=30.0
tasf.sim.collapse.consecutiveDays=2

# ── Replanning paralelo del modo colapso (PLAN_PERF_COLAPSO.md) ───────────
# Tamaño del pool de replans. maxPoolSize = 2 × core; queueCapacity = 20.
tasf.sim.replan.poolSize=4
